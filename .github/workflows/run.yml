name: Check Results Cron Job

on:
  schedule:
    # This instructs GitHub to run the script automatically every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to manually click a button to test it instantly

permissions:
  contents: write # Allows the server to update the announced_results.txt history file

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit and Save Results History
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add announced_results.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update announced results baseline" && git push)
